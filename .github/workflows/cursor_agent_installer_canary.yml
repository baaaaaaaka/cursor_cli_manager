name: cursor-agent-installer-canary

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate upstream installer metadata
        run: |
          set -euxo pipefail
          python -m pip install -U "setuptools<69" wheel
          python -m pip install -U pip
          python -m pip install -e .
          python scripts/check_cursor_agent_installer_canary.py
